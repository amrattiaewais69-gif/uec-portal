<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEC Submit Appeal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panel" style="max-width:700px;">
<div class="header-bar">
<div class="brand">
<img src="logo.png">
<h2>Summer Course Registration Portal</h2>
</div>
</div>

<div class="profile-section">
<div id="photoBox" class="profile-photo" style="width:80px;height:80px;border-width:2px;"></div>
<div class="profile-info">
<h3 id="studentName"></h3>
<p>Student ID: <span id="studentId"></span></p>
</div>
</div>

<div style="padding:25px 30px;">
<h3 style="color:var(--navy);font-family:'Playfair Display',serif;margin-bottom:15px;font-size:18px;">Submit Appeal</h3>

<div id="appealForm">
<label style="font-weight:700;font-size:13px;color:var(--navy);display:block;margin-bottom:5px;">Select Course</label>
<select id="course" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Lato',sans-serif;"></select>

<label style="font-weight:700;font-size:13px;color:var(--navy);display:block;margin:10px 0 5px;">Reason</label>
<textarea id="reason" rows="4" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'Lato',sans-serif;resize:vertical;" placeholder="Explain your reason..."></textarea>

<div style="display:flex;gap:8px;margin-top:15px;">
<button class="btn btn-gold btn-sm" onclick="submitAppeal()">Submit Appeal</button>
<button class="btn btn-navy btn-sm" onclick="window.location='student.html'">Back to Dashboard</button>
</div>
</div>

<div id="appealHistory" style="margin-top:25px;">
<h3 style="color:var(--navy);font-family:'Playfair Display',serif;margin-bottom:10px;font-size:16px;">Appeal History</h3>
<table id="historyTable"><tr><th>Course</th><th>Reason</th><th>Status</th><th>Date</th></tr></table>
</div>
</div>

<div class="footer-bar">
<button class="btn btn-danger btn-sm" onclick="localStorage.clear();location.href='login.html'">🚪 Logout</button>
</div>
</div>

<div class="footer">Designed by UEC ICT Department<br>© 2026 University of East Capital</div>

<script>
const API=window.location.origin+'/api';
const token=localStorage.getItem('portalToken');
if(!token){location.href='login.html';}

const user=JSON.parse(localStorage.getItem('portalUser')||'{}');
if(user.id){
document.getElementById('studentName').textContent=user.name||'';
document.getElementById('studentId').textContent=user.id||'';
showPhoto('photoBox',user.id,user.name);
}

function makeAvatar(name){
const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);
return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="60" fill="#0a1f3c"/><text x="60" y="68" font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#c5a358" text-anchor="middle" dominant-baseline="middle">'+initials+'</text></svg>');
}

function showPhoto(boxId,studentId,studentName){
const pb=document.getElementById(boxId);
pb.innerHTML='';
const img=new Image();
img.src='/photos/'+studentId+'.jpg';
img.style.cssText='width:100%;height:100%;border-radius:50%;object-fit:cover;';
img.onerror=function(){pb.style.backgroundImage='url('+makeAvatar(studentName)+')';};
img.onload=function(){pb.innerHTML='';pb.appendChild(img);};
setTimeout(function(){if(!pb.querySelector('img')){pb.style.backgroundImage='url('+makeAvatar(studentName)+')';}},2000);
}

loadAppealData();

async function loadAppealData(){
try{const res=await fetch(API+'/student/appeal-courses',{headers:{'Authorization':'Bearer '+token}});
if(res.ok){const data=await res.json();if(data.status==='closed'){document.getElementById('appealForm').innerHTML='<p style="color:#dc3545;text-align:center;padding:20px;">'+data.message+'</p><button class="btn btn-navy btn-sm" onclick="window.location=\'student.html\'">Back to Dashboard</button>';}else{const sel=document.getElementById('course');sel.innerHTML='';data.courses.forEach(c=>{const o=document.createElement('option');const code=c.includes(' - ')?c.split(' - ')[0]:c;o.value=code;o.textContent=c;sel.appendChild(o);});if(data.courses.length===0){sel.innerHTML='<option>No courses available</option>';}}}}catch(e){}
try{const res=await fetch(API+'/student/appeals',{headers:{'Authorization':'Bearer '+token}});
if(res.ok){const appeals=await res.json();const t=document.getElementById('historyTable');appeals.forEach(a=>{const tr=document.createElement('tr');tr.innerHTML='<td></td><td></td><td></td><td></td>';tr.cells[0].textContent=a.course;tr.cells[1].textContent=a.reason;tr.cells[2].textContent=a.status;tr.cells[3].textContent=new Date(a.date).toLocaleDateString();t.appendChild(tr);});}}catch(e){}}

async function submitAppeal(){
const course=document.getElementById('course').value;
const reason=document.getElementById('reason').value.trim();
if(!course){alert('Select a course');return;}
if(!reason){alert('Enter a reason');return;}
try{const res=await fetch(API+'/student/appeal',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({course,reason})});
const data=await res.json();
if(res.ok){alert('Appeal submitted!');document.getElementById('reason').value='';loadAppealData();}else{alert(data.error||'Failed');}}catch(e){alert('Error');}}
</script>
</body>
</html>
