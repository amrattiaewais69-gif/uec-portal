<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEC Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loadingScreen" class="login-wrapper">
<div class="login-box"><h3 style="color:var(--navy);">Loading...</h3></div>
</div>
<div id="loginScreen" class="login-wrapper" style="display:none">
<div class="login-box">
<img src="logo.png" class="logo">
<h2>University of East Capital</h2>
<p>Unified Student Portal — Login</p>
<select id="loginType" onchange="updatePlaceholder()">
<option value="student">Student</option>
<option value="supervisor">Supervisor</option>
<option value="finance">Finance</option>
<option value="control">Control</option>
<option value="admin">Admin</option>
</select>
<input id="username" placeholder="Student ID">
<input id="password" type="password" placeholder="Password">
<button class="btn btn-gold" style="width:100%;margin-top:10px;" onclick="login()">Login</button>
<p id="error" style="color:#dc3545;margin-top:10px;display:none;font-size:13px;"></p>
</div>
</div>
<div class="footer">Designed by UEC ICT Department<br>© 2026 University of East Capital</div>
<script>
const existingToken=localStorage.getItem('portalToken');
const existingRole=localStorage.getItem('portalRole');
if(existingToken&&existingRole){
location.href=existingRole+'.html';
}else{
document.getElementById('loadingScreen').style.display='none';
document.getElementById('loginScreen').style.display='flex';
}
function updatePlaceholder(){
const t=document.getElementById('loginType').value;
document.getElementById('username').placeholder=t==='student'?'Student ID':'Username';
}
async function login(){
const type=document.getElementById('loginType').value;
const username=document.getElementById('username').value.trim();
const password=document.getElementById('password').value;
const errEl=document.getElementById('error');
errEl.style.display='none';
if(!username||!password){errEl.textContent='Fill in all fields';errEl.style.display='block';return;}
const isStudent=type==='student';
const body=isStudent?{id:username,password}:{username,password,loginType:type};
const endpoint=isStudent?'/api/auth/login':'/api/auth/account-login';
try{
const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
const data=await res.json();
if(!res.ok){errEl.textContent=data.error||'Login failed';errEl.style.display='block';return;}
localStorage.setItem('portalToken',data.token);
localStorage.setItem('portalRole',isStudent?'student':data.role);
if(isStudent){
localStorage.setItem('portalUser',JSON.stringify(data.student));
if(data.student.firstLogin)localStorage.setItem('portalFirstLogin','1');
}else{
localStorage.setItem('portalDisplayName',data.displayName||data.username);
localStorage.setItem('portalUsername',data.username);
if(data.firstLogin)localStorage.setItem('portalFirstLogin','1');
}
location.href=(isStudent?'student':data.role)+'.html';
}catch(err){errEl.textContent='Connection error';errEl.style.display='block';}
}
</script>
</body>
</html>
